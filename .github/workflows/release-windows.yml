  #       shell: pwsh
  #       run: |
  #         $sig = Get-AuthenticodeSignature bin\soulforge-windows-x64.exe
  #         Write-Host "Status     : $($sig.Status)"
  #         Write-Host "SignerCert : $($sig.SignerCertificate.Subject)"
  #         if ($sig.Status -ne 'Valid') { throw "Signature invalid: $($sig.StatusMessage)" }
  #
  #     - uses: actions/upload-artifact@v4
  #       with:
  #         name: soulforge-windows-x64-signed
  #         path: bin/soulforge-windows-x64.exe
  #         retention-days: 7

  smoke:
    name: smoke (windows-latest)
    needs: build
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          # Swap to `soulforge-windows-x64-signed` after enabling the sign job.
          name: soulforge-windows-x64-unsigned
          path: bundle

      - name: Extract bundle
        shell: pwsh
        run: |
          $zip = Get-ChildItem bundle/*.zip | Select-Object -First 1
          Write-Host "Extracting $($zip.Name)..."
          Expand-Archive -Path $zip.FullName -DestinationPath extracted -Force
          Get-ChildItem extracted -Recurse | Select-Object FullName, Length | Format-Table -AutoSize

      - name: Show exe metadata
        shell: pwsh
        run: |
          $exe = "extracted\soulforge.exe"
          Get-Item $exe | Format-List Name,Length,VersionInfo
          $sig = Get-AuthenticodeSignature $exe
          Write-Host "Signature status: $($sig.Status)"

      - name: Verify native runtime present
        shell: pwsh
        run: |
          $dll = "extracted\deps\native\win32-x64\opentui.dll"
          if (-not (Test-Path $dll)) { throw "opentui.dll missing from bundle: $dll" }
          Write-Host "opentui.dll OK: $((Get-Item $dll).Length) bytes"

      - name: Run --version
        shell: pwsh
        run: |
          Unblock-File extracted\soulforge.exe
          extracted\soulforge.exe --version

      - name: Run --help
        shell: pwsh
        run: |
          extracted\soulforge.exe --help

  installer:
    name: installer (NSIS setup.exe)
    needs: build
    runs-on: windows-2025
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          persist-credentials: false

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: soulforge-windows-x64-staged
          path: dist/bundle/

      - name: Restore staged layout
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $target = "dist/bundle/soulforge-$version-windows-x64"
          New-Item -ItemType Directory -Force -Path $target | Out-Null
          if (Test-Path "dist/bundle/soulforge.exe") {
            Move-Item "dist/bundle/soulforge.exe" $target
            if (Test-Path "dist/bundle/deps") { Move-Item "dist/bundle/deps" $target }
            if (Test-Path "dist/bundle/LICENSE") { Move-Item "dist/bundle/LICENSE" $target }
            if (Test-Path "dist/bundle/README.txt") { Move-Item "dist/bundle/README.txt" $target }
          }

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $nsisPath = "C:\Program Files (x86)\NSIS"
          echo "$nsisPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build setup.exe
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/build-installer.ps1 -Arch x64 -SkipBundle

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: soulforge-windows-setup-exe
          path: dist/bundle/soulforge-setup-*-x64.exe
          retention-days: 7
          if-no-files-found: error

  release:
    name: upload to GitHub Release
    needs: [build, smoke, installer]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # uploads release assets
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: soulforge-windows-x64-unsigned
          path: bin

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: soulforge-windows-setup-exe
          path: bin

      - name: Compute SHA-256 for every artifact
        run: |
          cd bin
          for f in *.zip *.exe; do
            [ -f "$f" ] || continue
            sha256sum "$f" > "$f.sha256"
            cat "$f.sha256"
          done

      - name: Upload to Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            bin/*.zip
            bin/*.exe
            bin/*.sha256
          fail_on_unmatched_files: true
