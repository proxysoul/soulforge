name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.13"

      - run: bun install --frozen-lockfile

      - name: Lint
        run: bunx biome check src/ --reporter=github

      - name: Typecheck
        run: bun run typecheck

      # Tests skipped on CI to keep PR feedback fast. Run locally with
      # `bun test` before pushing if your change touches test-covered code.

  windows-platform-tests:
    name: windows-platform-tests (platform shim on win32)
    needs: check
    if: github.event_name == 'pull_request'
    runs-on: windows-2025-vs2026
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - name: Run Windows-specific tests
        shell: pwsh
        run: |
          bun test tests/platform-windows.test.ts tests/hearth-service-windows.test.ts

  windows-bundle:
    name: windows-bundle (cross-compile + zip + selfextract)
    needs: check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.13"

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Force-install win32 optional deps
        run: bun add --optional @opentui/core-win32-x64@0.2.0 || true

      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Cross-compile soulforge.exe
        env:
          NODE_ENV: production
        run: bun run build:binary:windows

      - name: Bundle (zip)
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/bundle-windows.ps1 -Arch x64 -NoExe

      - name: Build branded self-extractor
        run: bun run selfextract:windows

      - name: Locate artifacts
        id: locate
        run: |
          zip=$(ls dist/bundle/soulforge-*-windows-x64.zip | head -n1)
          selfextract=bin/soulforge-installer-x64.exe
          echo "zip=$zip" >> "$GITHUB_OUTPUT"
          echo "selfextract=$selfextract" >> "$GITHUB_OUTPUT"
          ls -la "$zip" "$selfextract"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: soulforge-windows-bundle-zip
          path: ${{ steps.locate.outputs.zip }}
          retention-days: 14

      # Whole staged bundle dir (exe + deps/) so the installer job can run
      # makensis against it without re-bundling.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: soulforge-windows-bundle-staged
          path: dist/bundle/soulforge-*-windows-x64/
          retention-days: 14
          if-no-files-found: error

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: soulforge-windows-installer-exe
          path: ${{ steps.locate.outputs.selfextract }}
          retention-days: 14

  windows-installer:
    name: windows-installer (NSIS on windows-2025-vs2026)
    needs: windows-bundle
    if: github.event_name == 'pull_request'
    runs-on: windows-2025-vs2026
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # Pull the staged bundle (exe + deps/) instead of re-bundling on Windows
      # — Bun's cross-compile already produced everything.
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: soulforge-windows-bundle-staged
          path: dist/bundle/

      - name: List staged bundle layout
        shell: pwsh
        run: |
          # download-artifact strips the leading dir name; restore it from the
          # version in package.json so the NSI's BUNDLE_DIR resolves cleanly.
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $target = "dist/bundle/soulforge-$version-windows-x64"
          New-Item -ItemType Directory -Force -Path $target | Out-Null
          # If artifact put files at dist/bundle/ root, move them into the
          # versioned dir; otherwise it already has the right layout.
          if (Test-Path "dist/bundle/soulforge.exe") {
            Move-Item "dist/bundle/soulforge.exe" $target
            if (Test-Path "dist/bundle/deps") { Move-Item "dist/bundle/deps" $target }
            if (Test-Path "dist/bundle/LICENSE") { Move-Item "dist/bundle/LICENSE" $target }
            if (Test-Path "dist/bundle/README.txt") { Move-Item "dist/bundle/README.txt" $target }
          }
          Get-ChildItem $target -Recurse -Depth 2 | Select-Object FullName | Format-Table -AutoSize

      - name: Install NSIS (chocolatey)
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # Path makensis on PATH for the next step.
          $nsisPath = "C:\Program Files (x86)\NSIS"
          echo "$nsisPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$nsisPath\makensis.exe" /VERSION

      - name: Build NSIS installer
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/build-installer.ps1 -Arch x64 -SkipBundle

      - name: Locate setup.exe
        id: locate
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist/bundle/soulforge-setup-*-x64.exe | Select-Object -First 1
          if (-not $exe) { throw "setup.exe not produced" }
          echo "setup=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "setup.exe: $($exe.Length) bytes"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: soulforge-windows-setup-exe
          path: ${{ steps.locate.outputs.setup }}
          retention-days: 14

  windows-smoke:
    name: windows-smoke (PR validation)
    needs: [windows-bundle, windows-installer]
    if: github.event_name == 'pull_request'
    runs-on: windows-2025-vs2026
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: soulforge-windows-bundle-zip
          path: bundle

      - name: Extract & run --version
        shell: pwsh
        run: |
          $zip = Get-ChildItem bundle/*.zip | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath extracted -Force
          $dll = "extracted\deps\native\win32-x64\opentui.dll"
          if (-not (Test-Path $dll)) { throw "opentui.dll missing from bundle" }
          Write-Host "opentui.dll: $((Get-Item $dll).Length) bytes"
          Unblock-File extracted\soulforge.exe
          extracted\soulforge.exe --version

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: soulforge-windows-installer-exe
          path: installer

      - name: Verify installer .exe is a valid PE
        shell: pwsh
        run: |
          $exe = Get-ChildItem installer/*.exe | Select-Object -First 1
          Unblock-File $exe.FullName
          Write-Host "installer exe: $($exe.Length) bytes"
          $bytes = [System.IO.File]::ReadAllBytes($exe.FullName)
          if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) { throw "not a PE binary" }
          Write-Host "PE header OK"

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: soulforge-windows-setup-exe
          path: setup

      - name: Verify setup.exe is a valid PE
        shell: pwsh
        run: |
          $exe = Get-ChildItem setup/*.exe | Select-Object -First 1
          Unblock-File $exe.FullName
          Write-Host "setup.exe: $($exe.Length) bytes"
          $bytes = [System.IO.File]::ReadAllBytes($exe.FullName)
          if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) { throw "not a PE binary" }
          Write-Host "PE header OK"

